<!DOCTYPE html>
<html>
<head>
  <title>Practice Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/practice.css">
</head>
<body>
<button class="back-btn" onclick="goBack()">⬅ Back to Menu</button>
<h2>Practice Mode</h2>

<div id="problem"></div>
<pre id="outputBox"></pre>
<div id="codeDisplay" class="code-box"></div>
<div id="explanation"></div>
<div class="nav-buttons">
  <button onclick="prevProblem()">⬅ Previous</button>
  <button onclick="nextProblem()">Next ➡</button>
</div>

<textarea id="userInput" rows="6" placeholder="Start typing code here..."></textarea>

<script src="data/problems.js"></script>
<script src="js/practice.js"></script>

</body>
</html>
